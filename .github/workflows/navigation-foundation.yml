name: Apply navigation foundation

on:
  push:
    branches:
      - agent/liber333-navigation-foundation

permissions:
  contents: write

jobs:
  transform-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply deterministic transform
        run: node scripts/apply-navigation-foundation.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit generated foundation
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Navigation foundation is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: establish shared navigation foundation"
          git push origin HEAD:${GITHUB_REF_NAME}
