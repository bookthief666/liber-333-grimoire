name: Apply Grimoire backup UI

on:
  push:
    branches:
      - agent/liber333-journal-backup
  pull_request:
    branches:
      - agent/liber333-oracle-rate-limit

permissions:
  contents: write

jobs:
  validate-and-apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-journal-backup-ui.mjs
      - run: npm ci
      - run: npm run check
      - name: Commit integrated source
        run: |
          if git diff --quiet; then
            echo "No integration changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/liber333.jsx
          git commit -m "Integrate Grimoire backup controls"
          git push
