name: Apply correspondence extraction

on:
  push:
    branches:
      - agent/liber333-correspondence-data
  pull_request:
    branches:
      - agent/liber333-ritual-data

permissions:
  contents: write

jobs:
  transform-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply deterministic extraction
        run: node scripts/apply-correspondence-extraction.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run unit regressions
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Commit generated extraction
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Correspondence extraction is already current."
            exit 0
          fi
          TARGET_BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract correspondence data with regression tests"
          git push origin HEAD:"${TARGET_BRANCH}"
