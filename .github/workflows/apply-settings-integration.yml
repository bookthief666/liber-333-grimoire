name: Apply settings integration

on:
  push:
    branches:
      - feature/settings-accessibility-performance
    paths:
      - scripts/apply-settings-integration.mjs
      - .github/workflows/apply-settings-integration.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/settings-accessibility-performance
          fetch-depth: 0
      - name: Apply exact source transformation
        run: node scripts/apply-settings-integration.mjs
      - name: Commit integrated source and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/liber333.jsx
          git rm scripts/apply-settings-integration.mjs .github/workflows/apply-settings-integration.yml
          git commit -m "Wire reduced ceremony into reading ritual"
          git push origin HEAD:feature/settings-accessibility-performance
