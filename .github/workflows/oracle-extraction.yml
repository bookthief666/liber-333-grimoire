name: Apply Oracle extraction

on:
  push:
    branches:
      - agent/liber333-oracle-extraction
  pull_request:
    branches:
      - agent/liber333-correspondence-data

permissions:
  contents: write

jobs:
  transform-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/liber333-oracle-extraction

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply deterministic extraction
        run: node scripts/apply-oracle-extraction.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run accumulated unit regressions
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Commit generated extraction
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Oracle extraction is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: extract Oracle hook and lock prompt output"
          git push origin HEAD:${GITHUB_REF_NAME}
