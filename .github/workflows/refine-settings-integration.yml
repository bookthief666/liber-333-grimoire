name: Refine settings integration

on:
  push:
    branches:
      - feature/settings-accessibility-performance
    paths:
      - scripts/refine-settings-integration.mjs
      - .github/workflows/refine-settings-integration.yml

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/settings-accessibility-performance
          fetch-depth: 0
      - name: Apply exact edge-case refinements
        run: node scripts/refine-settings-integration.mjs
      - name: Commit refinements and remove temporary machinery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ProductShell.jsx src/features/settings/experienceSettings.js
          git rm scripts/refine-settings-integration.mjs .github/workflows/refine-settings-integration.yml
          git commit -m "Refine effective motion and sound suppression"
          git push origin HEAD:feature/settings-accessibility-performance
