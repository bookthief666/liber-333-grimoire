name: Apply accuracy and provenance integration

on:
  push:
    branches:
      - agent/liber333-accuracy-provenance
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/apply-provenance.mjs
      - run: npm ci
      - run: npm run check
      - name: Commit integrated source
        run: |
          if git diff --quiet; then
            echo "No integration changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/liber333.jsx
          git commit -m "Integrate accuracy and provenance labels"
          git push
