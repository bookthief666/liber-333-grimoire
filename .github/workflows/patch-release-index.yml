name: Patch release metadata

on:
  push:
    branches:
      - agent/liber333-release-consolidation

permissions:
  contents: write

concurrency:
  group: patch-liber-333-release-metadata
  cancel-in-progress: true

jobs:
  patch-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/liber333-release-consolidation
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch release metadata
        run: node scripts/patch-release-index.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run complete release gate
        run: npm run check

      - name: Commit validated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Release metadata is already current."
            exit 0
          fi
          git commit -m "pwa: wire raster and Apple application icons"
          git push origin HEAD:agent/liber333-release-consolidation
