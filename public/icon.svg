<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05030f"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5e74" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2e4d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="210" fill="url(#core)"/>
  <!-- Outer zodiac ring (blurred) -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ff2e4d" stroke-width="7" opacity="0.25" filter="url(#glow)"/>
  <!-- Outer zodiac ring (crisp) -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="#ff2e4d" stroke-width="1.5" opacity="0.6"/>
  <!-- Tick marks (12 zodiac positions) -->
  <g stroke="#ff2e4d" stroke-width="1.5" opacity="0.4">
    <line x1="256" y1="68" x2="256" y2="80"/>
    <line x1="348.5" y1="94.5" x2="341.5" y2="106.5"/>
    <line x1="420" y1="163.5" x2="409" y2="170"/>
    <line x1="444" y1="256" x2="432" y2="256"/>
    <line x1="420" y1="348.5" x2="409" y2="342"/>
    <line x1="348.5" y1="417.5" x2="341.5" y2="405.5"/>
    <line x1="256" y1="444" x2="256" y2="432"/>
    <line x1="163.5" y1="417.5" x2="170.5" y2="405.5"/>
    <line x1="92" y1="348.5" x2="103" y2="342"/>
    <line x1="68" y1="256" x2="80" y2="256"/>
    <line x1="92" y1="163.5" x2="103" y2="170"/>
    <line x1="163.5" y1="94.5" x2="170.5" y2="106.5"/>
  </g>
  <!-- Sun circle (blurred halo) -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ff5e74" stroke-width="10" opacity="0.25" filter="url(#glow)"/>
  <!-- Sun circle (crisp) -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ff5e74" stroke-width="2.5" opacity="0.9"/>
  <!-- 8 radiating lines -->
  <g stroke="#ffd27a" stroke-width="1.8" opacity="0.55">
    <line x1="256" y1="150" x2="256" y2="116"/>
    <line x1="256" y1="362" x2="256" y2="396"/>
    <line x1="150" y1="256" x2="116" y2="256"/>
    <line x1="362" y1="256" x2="396" y2="256"/>
    <line x1="185" y1="185" x2="161" y2="161"/>
    <line x1="327" y1="327" x2="351" y2="351"/>
    <line x1="327" y1="185" x2="351" y2="161"/>
    <line x1="185" y1="327" x2="161" y2="351"/>
  </g>
  <!-- Center dot (blurred halo) -->
  <circle cx="256" cy="256" r="30" fill="#ff2e4d" opacity="0.35" filter="url(#glow)"/>
  <!-- Center dot (crisp) -->
  <circle cx="256" cy="256" r="20" fill="#ff5e74"/>
  <circle cx="256" cy="256" r="8" fill="#ffd27a"/>
</svg>
