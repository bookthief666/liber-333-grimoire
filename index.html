<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0000" />
    <meta name="description" content="Digital grimoire and gematric oracle for Aleister Crowley's Liber 333" />
    <title>Liber CCCXXXIII — The Book of Lies</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☉</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&family=JetBrains+Mono:wght@300;400;500;600&family=UnifrakturCook:wght@700&family=Pirata+One&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      /* Ritual Keyframes */
      @keyframes whisperFade {
        0% { opacity: 0; transform: translateY(10px) scale(0.95); }
        15% { opacity: 0.25; }
        85% { opacity: 0.25; }
        100% { opacity: 0; transform: translateY(-20px) scale(0.98); }
      }
      @keyframes shockwaveExpand {
        0% { width: 0; height: 0; opacity: 1; }
        100% { width: 100vw; height: 100vw; opacity: 0; }
      }
      @keyframes milestoneAppear {
        0% { opacity: 0; transform: scale(0.8) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes ritualPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes slideDown {
        0% { opacity: 0; transform: translateY(-8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes numberSlam {
        0% { transform: scale(3); opacity: 0; filter: blur(20px); }
        60% { transform: scale(0.95); opacity: 1; filter: blur(0); }
        80% { transform: scale(1.02); }
        100% { transform: scale(1); opacity: 1; filter: blur(0); }
      }
      @keyframes borderGlow {
        0%, 100% { border-color: rgba(220,38,38,0.15); }
        50% { border-color: rgba(220,38,38,0.35); }
      }
      /* ── Babalon Star: shapeshift, glitch, breathe ── */
      @keyframes babalonSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes babalonBreathe {
        0%, 100% { opacity: 0.10; filter: drop-shadow(0 0 6px rgba(255,0,40,0.5)); }
        50% { opacity: 0.30; filter: drop-shadow(0 0 22px rgba(255,0,40,0.9)); }
      }
      @keyframes babalonGlitch {
        0%, 100% { transform: translate(0,0); opacity: 0.22; }
        20% { transform: translate(-3px, 2px) skewX(8deg); opacity: 0.5; }
        22% { transform: translate(4px, -2px) skewX(-6deg); opacity: 0.15; }
        40% { transform: translate(-2px, -1px); opacity: 0.4; }
        60% { transform: translate(2px, 1px) skewX(3deg); opacity: 0.25; }
      }
      @keyframes babalonAppear {
        0% { opacity: 0; filter: blur(12px); }
        100% { opacity: 0.28; filter: blur(0); }
      }
      /* ── Illuminated manuscript: gilded shimmer ── */
      @keyframes gildShimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes emberFloat {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        15% { opacity: 0.8; }
        100% { transform: translateY(-40px) scale(0.4); opacity: 0; }
      }
      /* Gilded illuminated text (drop caps, sigils) */
      .gilded {
        background: linear-gradient(100deg, #7a1f1f 0%, #ff3b3b 25%, #ffd27a 45%, #fff3c4 50%, #ffd27a 55%, #ff3b3b 75%, #7a1f1f 100%);
        background-size: 200% auto;
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        animation: gildShimmer 6s linear infinite;
      }
      /* thin gilded rule between sections */
      .gild-rule {
        height: 1px; border: 0;
        background: linear-gradient(90deg, transparent, rgba(255,59,59,0.5), rgba(255,210,122,0.7), rgba(255,59,59,0.5), transparent);
      }
      /* Custom scrollbar — crimson */
      *::-webkit-scrollbar { width: 7px; height: 7px; }
      *::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
      *::-webkit-scrollbar-thumb { background: rgba(220,38,38,0.35); border-radius: 4px; }
      *::-webkit-scrollbar-thumb:hover { background: rgba(220,38,38,0.6); }
      /* ── Astral starfield twinkle / drifting marginalia / rotating glyph ring ── */
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.7; }
      }
      @keyframes glyphRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes glyphRingRev {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @keyframes marginaliaDrift {
        0% { opacity: 0; transform: translateY(12px) scale(0.96); }
        18% { opacity: 0.5; }
        82% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-24px) scale(1.02); }
      }
      /* ── Astral palette ── */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --void: #05030f;
        --void-2: #0a0718;
        --lux: #d8dcf2;      /* luminous silver text */
        --lux-dim: #9aa0c4;  /* secondary silver */
        --crimson: #ff2e4d;  /* reserved accent */
      }
      html, body { background: radial-gradient(140% 100% at 50% -10%, #0c0922 0%, #05030f 55%, #020108 100%); -webkit-text-size-adjust: 100%; }
      /* Floating luminous text — a dark halo for legibility over any ground + a faint glow.
         This is the core "floating, never-too-dark" treatment. */
      .lux {
        color: var(--lux);
        text-shadow: 0 0 1px rgba(0,0,0,0.95), 0 1px 10px rgba(0,0,0,0.9), 0 0 22px rgba(150,160,230,0.20);
      }
      .lux-dim { color: var(--lux-dim); text-shadow: 0 0 1px rgba(0,0,0,0.95), 0 1px 8px rgba(0,0,0,0.85); }
      .lux-crimson {
        color: #ff5e74;
        text-shadow: 0 0 1px rgba(0,0,0,0.9), 0 0 18px rgba(255,46,77,0.55), 0 0 40px rgba(255,46,77,0.25);
      }
      /* Hairline "starlight" rule — replaces borders between floating sections */
      .star-rule {
        height: 1px; border: 0;
        background: linear-gradient(90deg, transparent, rgba(150,160,230,0.05), rgba(216,220,242,0.55), rgba(255,94,116,0.45), rgba(216,220,242,0.55), rgba(150,160,230,0.05), transparent);
      }
      /* hide horizontal scrollbar on the nav rail but keep it scrollable */
      .nav-rail { scrollbar-width: none; -ms-overflow-style: none; }
      .nav-rail::-webkit-scrollbar { display: none; }
      /* Global button reset — prevents browser adding borders/backgrounds */
      button { border: 0; background: transparent; cursor: pointer; padding: 0; }
      /* Ritual button glow on hover */
      .btn-ritual { transition: letter-spacing 0.5s ease, filter 0.35s ease, opacity 0.3s ease; }
      .btn-ritual:hover:not(:disabled) { filter: drop-shadow(0 0 12px rgba(255,46,77,0.7)); }
      .btn-dim-hover { transition: letter-spacing 0.4s ease, color 0.3s ease, filter 0.35s ease; }
      .btn-dim-hover:hover { filter: drop-shadow(0 0 8px rgba(216,220,242,0.3)); color: #d8dcf2; }
      /* CSS star field — guaranteed base layer, visible even without WebGL */
      .css-stars {
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background:
          radial-gradient(1px 1px at 12% 18%, rgba(216,220,242,0.7) 0%, transparent 100%),
          radial-gradient(1px 1px at 28% 42%, rgba(216,220,242,0.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 45% 8%,  rgba(216,220,242,0.8) 0%, transparent 100%),
          radial-gradient(1px 1px at 62% 31%, rgba(216,220,242,0.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 78% 55%, rgba(216,220,242,0.7) 0%, transparent 100%),
          radial-gradient(1px 1px at 88% 14%, rgba(216,220,242,0.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 5%  70%, rgba(216,220,242,0.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 35% 82%, rgba(216,220,242,0.4) 0%, transparent 100%),
          radial-gradient(1px 1px at 92% 77%, rgba(216,220,242,0.7) 0%, transparent 100%),
          radial-gradient(1px 1px at 55% 61%, rgba(216,220,242,0.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 18% 92%, rgba(216,220,242,0.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 72% 88%, rgba(216,220,242,0.4) 0%, transparent 100%),
          radial-gradient(2px 2px at 40% 25%, rgba(255,200,200,0.5) 0%, transparent 100%),
          radial-gradient(2px 2px at 82% 40%, rgba(200,210,255,0.4) 0%, transparent 100%),
          radial-gradient(2px 2px at 20% 60%, rgba(255,210,180,0.4) 0%, transparent 100%),
          radial-gradient(1px 1px at 95% 5%,  rgba(216,220,242,0.8) 0%, transparent 100%),
          radial-gradient(1px 1px at 50% 95%, rgba(216,220,242,0.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 7%  35%, rgba(216,220,242,0.6) 0%, transparent 100%),
          radial-gradient(1px 1px at 65% 72%, rgba(216,220,242,0.5) 0%, transparent 100%),
          radial-gradient(1px 1px at 30% 12%, rgba(216,220,242,0.7) 0%, transparent 100%);
      }
      /* Slow shimmer on the faint nebula cloud */
      .css-nebula {
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background: radial-gradient(ellipse 70% 45% at 60% 30%, rgba(80,40,160,0.12) 0%, transparent 70%),
                    radial-gradient(ellipse 50% 60% at 25% 65%, rgba(40,20,100,0.09) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 30% at 80% 75%, rgba(100,30,60,0.08) 0%, transparent 70%);
        animation: nebulaDrift 30s ease-in-out infinite alternate;
      }
      @keyframes nebulaDrift {
        0%   { opacity: 0.6; transform: scale(1)   translateX(0); }
        50%  { opacity: 1.0; transform: scale(1.04) translateX(8px); }
        100% { opacity: 0.7; transform: scale(1.01) translateX(-5px); }
      }
    </style>
  </head>
  <body class="bg-black">
    <div class="css-nebula" aria-hidden="true"></div>
    <div class="css-stars" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
